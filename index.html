<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eventimes — Event Management System</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #0a0a0a;
  --surface: #1a1a1a;
  --surface2: #2a2a2a;
  --accent: #c8f05a;
  --accent-dark: #a8d040;
  --text: #ffffff;
  --text2: #b0b0b0;
  --text3: #707070;
  --danger: #ff4757;
  --success: #4ade80;
  --border: rgba(255,255,255,0.1);
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Auth Page Styles */
.auth-container {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
  padding: 20px;
}

.auth-card {
  background: var(--surface);
  border-radius: 24px;
  padding: 48px;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
  border: 1px solid var(--border);
}

.logo {
  text-align: center;
  margin-bottom: 32px;
}

.logo h1 {
  font-family: 'Fraunces', serif;
  font-size: 32px;
  color: var(--accent);
}

.logo span {
  color: var(--text);
}

.logo p {
  color: var(--text3);
  margin-top: 8px;
  font-size: 14px;
}

.auth-tabs {
  display: flex;
  gap: 12px;
  margin-bottom: 32px;
  background: var(--surface2);
  padding: 4px;
  border-radius: 12px;
}

.auth-tab {
  flex: 1;
  padding: 12px;
  border: none;
  background: transparent;
  color: var(--text3);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.3s;
}

.auth-tab.active {
  background: var(--accent);
  color: #000;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  margin-bottom: 8px;
  color: var(--text2);
  font-size: 14px;
  font-weight: 500;
}

.form-group input, .form-group select {
  width: 100%;
  padding: 14px 16px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 14px;
  transition: all 0.3s;
}

.form-group input:focus, .form-group select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(200, 240, 90, 0.2);
}

.btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
}

.btn-primary {
  background: var(--accent);
  color: #000;
}

.btn-primary:hover {
  background: var(--accent-dark);
  transform: translateY(-2px);
}

.btn-danger {
  background: var(--danger);
  color: white;
}

.btn-secondary {
  background: var(--surface2);
  color: var(--text);
  width: auto;
  padding: 10px 20px;
}

.btn-sm {
  width: auto;
  padding: 8px 16px;
  font-size: 13px;
}

.btn-book {
  background: var(--success);
  color: #000;
}

.btn-book:hover {
  opacity: 0.9;
  transform: translateY(-2px);
}

/* Dashboard Styles */
.dashboard-container {
  min-height: 100vh;
}

.navbar {
  background: var(--surface);
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.nav-logo {
  font-family: 'Fraunces', serif;
  font-size: 24px;
  font-weight: 600;
}

.nav-logo span {
  color: var(--accent);
}

.nav-user {
  display: flex;
  align-items: center;
  gap: 16px;
}

.user-name {
  color: var(--text2);
}

.main-content {
  padding: 32px;
  max-width: 1400px;
  margin: 0 auto;
}

.welcome-section {
  margin-bottom: 32px;
}

.welcome-section h1 {
  font-size: 28px;
  margin-bottom: 8px;
}

.welcome-section p {
  color: var(--text3);
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-bottom: 32px;
}

.stat-card {
  background: var(--surface);
  padding: 24px;
  border-radius: 16px;
  border: 1px solid var(--border);
}

.stat-card h3 {
  font-size: 14px;
  color: var(--text3);
  margin-bottom: 8px;
}

.stat-card .stat-value {
  font-size: 32px;
  font-weight: 700;
  color: var(--accent);
}

.action-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 16px;
}

.events-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 20px;
}

.event-card {
  background: var(--surface);
  border-radius: 16px;
  overflow: hidden;
  border: 1px solid var(--border);
  transition: transform 0.3s;
}

.event-card:hover {
  transform: translateY(-4px);
  border-color: var(--accent);
}

.event-icon {
  height: 120px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  background: var(--surface2);
}

.event-info {
  padding: 20px;
}

.event-info h3 {
  margin-bottom: 12px;
  font-size: 18px;
}

.event-details {
  color: var(--text3);
  font-size: 13px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.event-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px;
}

.event-price {
  font-weight: 700;
  color: var(--accent);
}

.event-seats {
  font-size: 12px;
  color: var(--text3);
}

.seats-low {
  color: var(--danger);
}

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.8);
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal.active {
  display: flex;
}

.modal-content {
  background: var(--surface);
  border-radius: 24px;
  padding: 32px;
  width: 90%;
  max-width: 500px;
  max-height: 80vh;
  overflow-y: auto;
}

.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.modal-close {
  background: none;
  border: none;
  color: var(--text);
  font-size: 24px;
  cursor: pointer;
}

textarea {
  width: 100%;
  padding: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  resize: vertical;
  font-family: inherit;
}

.empty-state {
  text-align: center;
  padding: 60px;
  color: var(--text3);
}

.booking-details {
  background: var(--surface2);
  padding: 16px;
  border-radius: 12px;
  margin: 16px 0;
}

.booking-details p {
  margin: 8px 0;
}

.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 12px;
}

.tab-btn {
  background: none;
  border: none;
  padding: 10px 20px;
  color: var(--text3);
  cursor: pointer;
  font-size: 14px;
  border-radius: 8px;
  transition: all 0.3s;
}

.tab-btn.active {
  background: var(--accent);
  color: #000;
}

.my-bookings-section {
  margin-top: 32px;
}

@media (max-width: 768px) {
  .auth-card { padding: 32px; margin: 16px; }
  .main-content { padding: 16px; }
  .navbar { padding: 12px 16px; }
  .stats-grid { grid-template-columns: 1fr; }
  .events-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<script>

// Initialize Firebase
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// ============================================================
//  App State
// ============================================================
let currentUser = null;
let events = [];
let myBookings = [];
let currentView = 'auth';
let activeTab = 'events';

// ============================================================
//  Helper Functions
// ============================================================
function showToast(message, type = 'success') {
  alert(message);
}

// ============================================================
//  Auth Functions
// ============================================================
async function signUp(email, password, name) {
  try {
    const userCredential = await auth.createUserWithEmailAndPassword(email, password);
    const user = userCredential.user;
    
    await db.collection('users').doc(user.uid).set({
      name: name,
      email: email,
      createdAt: new Date(),
      role: 'user'
    });
    
    return { success: true, user: { uid: user.uid, name: name, email: email } };
  } catch (error) {
    return { success: false, error: error.message };
  }
}

async function signIn(email, password) {
  try {
    const userCredential = await auth.signInWithEmailAndPassword(email, password);
    const user = userCredential.user;
    
    const userDoc = await db.collection('users').doc(user.uid).get();
    const userData = userDoc.data();
    
    return { 
      success: true, 
      user: { 
        uid: user.uid, 
        name: userData?.name || email.split('@')[0], 
        email: user.email 
      } 
    };
  } catch (error) {
    return { success: false, error: error.message };
  }
}

async function signOut() {
  await auth.signOut();
  currentUser = null;
  currentView = 'auth';
  render();
}

// ============================================================
//  Event Functions
// ============================================================
async function loadEvents() {
  try {
    const snapshot = await db.collection('events').get();
    events = [];
    snapshot.forEach(doc => {
      events.push({ id: doc.id, ...doc.data() });
    });
    return events;
  } catch (error) {
    console.error("Error loading events:", error);
    return [];
  }
}

async function addEvent(eventData) {
  try {
    const docRef = await db.collection('events').add({
      ...eventData,
      createdAt: new Date(),
      createdBy: currentUser?.uid,
      booked: 0
    });
    return { success: true, id: docRef.id };
  } catch (error) {
    return { success: false, error: error.message };
  }
}

// ============================================================
//  Booking Functions
// ============================================================
async function loadMyBookings() {
  if (!currentUser) return [];
  try {
    const snapshot = await db.collection('bookings')
      .where('userId', '==', currentUser.uid)
      .get();
    myBookings = [];
    snapshot.forEach(doc => {
      myBookings.push({ id: doc.id, ...doc.data() });
    });
    
    // Populate event details for each booking
    for (let booking of myBookings) {
      const eventDoc = await db.collection('events').doc(booking.eventId).get();
      if (eventDoc.exists) {
        booking.event = { id: eventDoc.id, ...eventDoc.data() };
      }
    }
    return myBookings;
  } catch (error) {
    console.error("Error loading bookings:", error);
    return [];
  }
}

async function createBooking(eventId, tickets) {
  try {
    const eventDoc = await db.collection('events').doc(eventId).get();
    const event = eventDoc.data();
    
    if (!event) {
      return { success: false, error: 'Event not found' };
    }
    
    const seatsLeft = event.capacity - (event.booked || 0);
    if (seatsLeft < tickets) {
      return { success: false, error: 'Not enough seats available' };
    }
    
    const totalPrice = (event.price || 0) * tickets;
    
    // Fix: Store date as Firestore Timestamp for consistency
    await db.collection('bookings').add({
      userId: currentUser.uid,
      userName: currentUser.name,
      eventId: eventId,
      eventTitle: event.title,
      tickets: tickets,
      totalPrice: totalPrice,
      bookingDate: firebase.firestore.FieldValue.serverTimestamp(), // This creates proper Firestore Timestamp
      status: 'confirmed'
    });
    
    await db.collection('events').doc(eventId).update({
      booked: (event.booked || 0) + tickets
    });
    
    return { success: true };
  } catch (error) {
    return { success: false, error: error.message };
  }
}

      { title: '🏃 Marathon City Run', category: 'sports', date: '2026-07-04', time: '07:00', venue: 'City Center', city: 'Boston', price: 60, capacity: 5000, booked: 0, emoji: '🏃', description: 'Annual 42k marathon.' },
      { title: '🚀 Startup Pitch Day', category: 'business', date: '2026-07-18', time: '10:00', venue: 'Innovation Hub', city: 'Seattle', price: 25, capacity: 300, booked: 0, emoji: '🚀', description: '20 startups pitch to VCs.' }

        <input type="email" id="login-email" required placeholder="you@example.com">

function renderSignupForm() {

function renderDashboard() {
  return `

          <span class="user-name">👋 ${currentUser?.name || 'User'}</span>

      </nav>
      
      <main class="main-content">
        <div class="welcome-section">

          <p>Discover and manage amazing events</p>
        </div>
        
        <div class="stats-grid">
          <div class="stat-card">

          </div>
          <div class="stat-card">
            <h3>My Bookings</h3>
            <div class="stat-value">${myBookings.length}</div>
          </div>
          <div class="stat-card">

            <div class="stat-value">${new Set(events.map(e => e.city)).size}</div>
          </div>
        </div>
        
        <div class="tabs">
          <button class="tab-btn ${activeTab === 'events' ? 'active' : ''}" onclick="switchDashboardTab('events')">📅 All Events</button>
          <button class="tab-btn ${activeTab === 'bookings' ? 'active' : ''}" onclick="switchDashboardTab('bookings')">🎟️ My Bookings</button>
          <button class="tab-btn ${activeTab === 'create' ? 'active' : ''}" onclick="switchDashboardTab('create')">➕ Create Event</button>
        </div>
        
        ${activeTab === 'events' ? renderEventsTab() : ''}
        ${activeTab === 'bookings' ? renderBookingsTab() : ''}

function renderEventCard(event) {
  const seatsLeft = event.capacity - (event.booked || 0);
  const isLowSeats = seatsLeft < 20 && seatsLeft > 0;
  const isSoldOut = seatsLeft === 0;
  
  return `
    <div class="event-card">
      <div class="event-icon">${event.emoji || '🎉'}</div>
      <div class="event-info">
        <h3>${event.title}</h3>
        <div class="event-details">📅 ${event.date} · ${event.time}</div>
        <div class="event-details">📍 ${event.venue}, ${event.city}</div>
        <div class="event-details">🏷️ ${event.category}</div>
        <div class="event-details">${event.description ? event.description.substring(0, 80) + '...' : ''}</div>
      </div>
      <div class="event-footer">
        <span class="event-price">${event.price === 0 ? 'FREE' : '$' + event.price}</span>
        <span class="event-seats ${isLowSeats ? 'seats-low' : ''}">${isSoldOut ? 'Sold Out' : seatsLeft + ' seats left'}</span>
        ${!isSoldOut ? `<button class="btn btn-sm btn-book" onclick="openBookingModal('${event.id}')">Book Now</button>` : `<button class="btn btn-sm btn-secondary" disabled style="opacity:0.5">Sold Out</button>`}
      </div>
    </div>
  `;
}

function renderBookingCard(booking) {
  const event = booking.event;
  if (!event) return '';
  
  // Fix: Convert Firebase Timestamp to Date properly
  let bookingDateString = 'Date unavailable';
  if (booking.bookingDate) {
    try {
      // Check if it's a Firebase Timestamp
      if (booking.bookingDate.toDate) {
        bookingDateString = booking.bookingDate.toDate().toLocaleDateString();
      } 
      // Check if it's a regular Date object
      else if (booking.bookingDate instanceof Date) {
        bookingDateString = booking.bookingDate.toLocaleDateString();
      }
      // Check if it's a string
      else if (typeof booking.bookingDate === 'string') {
        bookingDateString = new Date(booking.bookingDate).toLocaleDateString();
      }
      // Check if it's a number (timestamp)
      else if (typeof booking.bookingDate === 'number') {
        bookingDateString = new Date(booking.bookingDate).toLocaleDateString();
      }
      else {
        bookingDateString = 'Just now';
      }
    } catch(e) {
      bookingDateString = 'Recently';
    }
  }
  
  return `
    <div class="event-card">
      <div class="event-icon">${event.emoji || '🎉'}</div>
      <div class="event-info">
        <h3>${event.title}</h3>
        <div class="event-details">📅 ${event.date} · ${event.time}</div>
        <div class="event-details">📍 ${event.venue}, ${event.city}</div>
        <div class="event-details">🎟️ ${booking.tickets} ticket(s)</div>
        <div class="event-details">💰 Total: $${booking.totalPrice}</div>
        <div class="event-details">✅ Status: ${booking.status}</div>
        <div class="event-details">📅 Booked on: ${bookingDateString}</div>
      </div>
      <div class="event-footer">
        <button class="btn btn-sm btn-primary" onclick="viewEventDetails('${event.id}')">View Event</button>
      </div>
    </div>
  `;
}

// ============================================================
//  Event Handlers
// ============================================================
window.activeTab = 'login';

window.switchTab = (tab) => {
  window.activeTab = tab;
  render();
};

window.switchDashboardTab = (tab) => {
  activeTab = tab;
  render();
};

window.handleLogin = async (e) => {
  e.preventDefault();
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  
  const result = await signIn(email, password);
  if (result.success) {
    currentUser = result.user;
    currentView = 'dashboard';
    activeTab = 'events';
    await seedEvents();
    await loadEvents();
    await loadMyBookings();
    render();
  } else {
    alert('Login failed: ' + result.error);
  }
};

window.handleSignup = async (e) => {
  e.preventDefault();
  const name = document.getElementById('signup-name').value;
  const email = document.getElementById('signup-email').value;
  const password = document.getElementById('signup-password').value;
  
  if (password.length < 6) {
    alert('Password must be at least 6 characters');
    return;
  }
  
  const result = await signUp(email, password, name);
  if (result.success) {
    currentUser = result.user;
    currentView = 'dashboard';
    activeTab = 'events';
    await seedEvents();
    await loadEvents();
    await loadMyBookings();
    render();
  } else {
    alert('Signup failed: ' + result.error);
  }
};

window.handleLogout = async () => {
  await signOut();
};

window.handleCreateEvent = async (e) => {
  e.preventDefault();
  
  const eventData = {
    title: document.getElementById('new-event-title').value,
    description: document.getElementById('new-event-desc').value,
    category: document.getElementById('new-event-category').value,
    emoji: document.getElementById('new-event-emoji').value || '🎉',
    date: document.getElementById('new-event-date').value,
    time: document.getElementById('new-event-time').value,
    venue: document.getElementById('new-event-venue').value,
    city: document.getElementById('new-event-city').value,
    price: parseInt(document.getElementById('new-event-price').value) || 0,
    capacity: parseInt(document.getElementById('new-event-capacity').value) || 100,
    booked: 0
  };
  
  const result = await addEvent(eventData);
  if (result.success) {
    await loadEvents();
    activeTab = 'events';
    render();
    alert('Event created successfully!');
  } else {
    alert('Error: ' + result.error);
  }
};

window.openBookingModal = (eventId) => {
  const event = events.find(e => e.id === eventId);
  if (!event) return;
  
  const seatsLeft = event.capacity - (event.booked || 0);
  
  const modalBody = `
    <div class="booking-details">
      <p><strong>${event.emoji || '🎉'} ${event.title}</strong></p>
      <p>📅 ${event.date} at ${event.time}</p>
      <p>📍 ${event.venue}, ${event.city}</p>
      <p>💰 Price: ${event.price === 0 ? 'FREE' : '$' + event.price}</p>
      <p>🎟️ Available seats: ${seatsLeft}</p>
    </div>
    <div class="form-group">
      <label>Number of Tickets</label>
      <input type="number" id="booking-tickets" min="1" max="${Math.min(seatsLeft, 10)}" value="1">
    </div>
    <div class="form-group">
      <p><strong>Total: $<span id="booking-total">${event.price}</span></strong></p>
    </div>
    <button class="btn btn-primary" onclick="confirmBooking('${eventId}', ${event.price})">Confirm Booking →</button>
  `;
  
  document.getElementById('booking-modal-body').innerHTML = modalBody;
  document.getElementById('booking-modal').classList.add('active');
  
  // Add ticket quantity listener
  const ticketInput = document.getElementById('booking-tickets');
  if (ticketInput) {
    ticketInput.addEventListener('change', () => {
      const tickets = parseInt(ticketInput.value) || 1;
      document.getElementById('booking-total').textContent = event.price * tickets;
    });
  }
};

window.confirmBooking = async (eventId, price) => {
  const tickets = parseInt(document.getElementById('booking-tickets').value) || 1;
  
  const result = await createBooking(eventId, tickets);
  if (result.success) {
    closeBookingModal();
    await loadEvents();
    await loadMyBookings();
    render();
    alert(`Successfully booked ${tickets} ticket(s)!`);
  } else {
    alert('Booking failed: ' + result.error);
  }
};

window.closeBookingModal = () => {
  document.getElementById('booking-modal').classList.remove('active');
};

window.viewEventDetails = (eventId) => {
  const event = events.find(e => e.id === eventId);
  if (event) {
    alert(`📌 ${event.title}\n\n📅 ${event.date} at ${event.time}\n📍 ${event.venue}, ${event.city}\n💰 ${event.price === 0 ? 'FREE' : '$' + event.price}\n🎟️ ${event.capacity - (event.booked || 0)} seats left\n\n${event.description || 'No description available.'}`);
  }
};

// ============================================================
//  Main Render Function
// ============================================================
async function render() {
  const app = document.getElementById('app');
  
  if (currentView === 'auth') {
    app.innerHTML = renderAuthPage();
  } else if (currentView === 'dashboard') {
    app.innerHTML = renderDashboard();
  }
}

// ============================================================
//  Auth State Listener
// ============================================================
auth.onAuthStateChanged(async (user) => {
  if (user) {
    const userDoc = await db.collection('users').doc(user.uid).get();
    const userData = userDoc.data();
    currentUser = {
      uid: user.uid,
      name: userData?.name || user.email.split('@')[0],
      email: user.email
    };
    currentView = 'dashboard';
    activeTab = 'events';
    await seedEvents();
    await loadEvents();
    await loadMyBookings();
    render();
  } else {
    currentUser = null;
    currentView = 'auth';
    render();
  }
});

// Initial render
render();
</script>
